<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🌷</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="scene">

  <!-- TEXT -->
  <div class="text">
    <h1>For You 💖</h1>
    <p>Semoga harimu seindah bunga ini 🌷</p>
  </div>

  <!-- TULIP 1 -->
  <div class="tulip" style="--d:0s">
    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
    <div class="petal center"></div>
    <div class="petal left"></div>
    <div class="petal right"></div>
  </div>

  <!-- TULIP 2 -->
  <div class="tulip" style="--d:.5s">
    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
    <div class="petal center"></div>
    <div class="petal left"></div>
    <div class="petal right"></div>
  </div>

  <!-- TULIP 3 -->
  <div class="tulip" style="--d:1s">
    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
    <div class="petal center"></div>
    <div class="petal left"></div>
    <div class="petal right"></div>
  </div>

  <!-- FIREFLIES -->
  <div class="fireflies">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

</div>

</body>
</html>
